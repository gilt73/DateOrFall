    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">

    <meta name="app-version" content="1.0.7">

    <title>דייט או חובה</title>
    <meta property="og:title" content="דייט או חובה">
    <meta property="og:description" content="המשחק ששבר לדייטים את הקרח">
    <meta name="apple-mobile-web-app-title" content="דייט או חובה">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.7">
    <link rel="icon" type="image/png" href="icon.png?v=1.0.7">

    <!-- Preconnect to CDNs for faster loading -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Outfit:wght@400;600;800&family=Heebo:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Heebo', 'sans-serif'], display: ['Outfit', 'sans-serif'], handwriting: ['Amatic SC', 'cursive'] },
                    colors: { brand: { gold: '#FFD700', deep: '#050510', neonBlue: '#00f3ff', neonPink: '#ff00ff', amber: '#ffbf00', purple: '#9d00ff' } }
                }
            }
        }
    </script>

    <style>
        /* iOS Safari: use dynamic viewport height so the bottom isn't cut off by the address bar */
        :root {
            --app-height: 100vh;
        }

        body {
            background-color: #050510;
            color: white;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Heebo', sans-serif;
            height: var(--app-height);
            height: 100dvh; /* modern browsers */
        }

        .text-neon-blue {
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .text-neon-pink {
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8), 0 0 20px rgba(255, 0, 255, 0.4);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(20px); /* Safari / iOS */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Fallback for browsers without backdrop-filter support (older Android) */
        @supports not (backdrop-filter: blur(1px)) {
            .glass {
                background: rgba(15, 15, 30, 0.92);
            }
        }

        .active-pill {
            background: #00f3ff;
            color: black;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }

        .dice-face {
            backface-visibility: hidden;
            background: rgba(18, 18, 25, 0.98);
            border: 1px solid #00f3ff;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: twinkle 1s forwards;
            z-index: 100;
        }

        @keyframes twinkle {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Smooth background transitions for This/That images */
        #tt-1, #tt-2 {
            transition: background-image 0.4s ease, background-size 0.4s ease;
            background-size: cover;
        }

        /* Sparkle container — sits on top of everything, pointer-events off */
        #sparkle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
    </style>
</head>

<body class="w-screen overflow-hidden">

                    2026 &copy;</p>
            </div>
        </div>
    </div>

    <!-- MAIN LOBBY -->

        function getRandom(arr) {
            if (!arr || arr.length === 0) return null;
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function setLevel(level, btn) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(b => {
                b.className = 'level-btn flex-1 py-2 text-sm font-bold text-white/40 transition-all rounded-full hover:text-white/70';
            });
            btn.className = 'level-btn flex-1 py-2 text-sm font-bold active-pill rounded-full transition-all text-black shadow-[0_0_15px_rgba(255,215,0,0.4)]';
            spawnSparkles(btn.offsetLeft + btn.offsetWidth / 2, btn.offsetTop + btn.offsetHeight / 2, 10);
        }

        function openGame(game) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(game + '-screen');
            if (target) {
                target.classList.add('active');
                if (game === 'dice') initDice();
                if (game === 'cards') nextCard();
                if (game === 'thisthat') nextThisThat();
                if (game === 'timer') resetTimer();
            }
        }

        function goHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
            if (timerInterval) clearInterval(timerInterval);
            isDiceRolling = false; // always unlock when leaving dice screen
        }

        // DICE LOGIC
        function initDice() {
            const cube = document.getElementById('cube');
            const faces = [
                { rot: 'rotateY(0deg)', img: 'deep_man.webp?v=1.0.3', type: 'truth', gender: 'male' },
                { rot: 'rotateY(180deg)', img: 'deep_woman.webp?v=1.0.3', type: 'truth', gender: 'female' },
                { rot: 'rotateY(90deg)', img: 'wild_man.webp?v=1.0.3', type: 'dare', gender: 'male' },
                { rot: 'rotateY(-90deg)', img: 'wild_woman.webp?v=1.0.3', type: 'dare', gender: 'female' },
                { rot: 'rotateX(90deg)', img: 'cheers_man.webp?v=1.0.3', type: 'truth', gender: 'unisex' },
                { rot: 'rotateX(-90deg)', img: 'cheers_woman.webp?v=1.0.3', type: 'dare', gender: 'unisex' }
            ];
            cube.innerHTML = faces.map(f => `
                <div class="dice-face absolute w-full h-full flex items-center justify-center text-center rounded-3xl border border-brand-neonBlue/50 shadow-[0_0_15px_rgba(0,243,255,0.2)]" 
                     style="transform:${f.rot} translateZ(96px); background: url('${f.img}') center/cover; overflow: hidden;" 
                     data-type="${f.type}" data-gender="${f.gender}"></div>`).join('');
        }

        function rollDice() {
            if (isDiceRolling) return; // prevent double-tap during animation
            isDiceRolling = true;

            const resCard = document.getElementById('dice-result');
            const resText = document.getElementById('dice-text');
            const cube = document.getElementById('cube');

            // Possible final rotations that keep images upright (multiples of 360)
            const finalRotations = [
                { x: 0, y: 0 },      // Front face (deep_man)
                { x: 0, y: 180 },    // Back face (deep_woman)
                { x: 0, y: 90 },     // Right face (wild_man)
                { x: 0, y: -90 },    // Left face (wild_woman)
                { x: 90, y: 0 },     // Top face (cheers_man)
                { x: -90, y: 0 }     // Bottom face (cheers_woman)
            ];

            const chosen = finalRotations[Math.floor(Math.random() * finalRotations.length)];
            const spinX = (Math.floor(Math.random() * 3 + 3) * 360) + chosen.x;
            const spinY = (Math.floor(Math.random() * 3 + 3) * 360) + chosen.y;

            cube.style.transform = `rotateX(${spinX}deg) rotateY(${spinY}deg)`;
            resCard.style.opacity = '0';

            setTimeout(() => {
                const list = gameData.cube.filter(m => m.level === currentLevel || m.level === 'all');
                const item = getRandom(list);
                resText.innerText = item ? item.content : "אין משימות";
                resCard.style.opacity = '1';
                spawnSparkles(window.innerWidth / 2, window.innerHeight / 3, 30);
                isDiceRolling = false; // unlock after result appears
            }, DICE_SPIN_TIME);
        }

        // CARDS LOGIC
        function nextCard() {
            if (!gameData) return;
            const content = document.getElementById('card-content');
            const label = document.getElementById('card-level-label');
            label.innerText = currentLevel.toUpperCase();

            // Filters cards where level matches UI or is set to 'all'
            const list = gameData.cards.filter(c => c.level === currentLevel || c.level === 'all');
            const item = getRandom(list);

            content.innerText = item ? item.content : "חסר תוכן ברמה זו";
            spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 15);
        }

        // THIS THAT LOGIC
        function addUnsplashParams(url) {
            // Limit Unsplash images to 800px wide at 75% quality to reduce bandwidth
            if (url.includes('unsplash.com')) {
                return url + (url.includes('?') ? '&' : '?') + 'w=800&q=75&auto=format';
            }
            return url;
        }

        function nextThisThat() {
            if (!gameData || !gameData.this_or_that.length) return;
            const item = getRandom(gameData.this_or_that);
            const d1 = document.getElementById('tt-1');
            const d2 = document.getElementById('tt-2');
            const url1 = addUnsplashParams(item.img1);
            const url2 = addUnsplashParams(item.img2);

            // Preload both images before switching so there's no flash
            const img1 = new Image();
            const img2 = new Image();
            img1.src = url1;
            img2.src = url2;

            img1.onload = () => { d1.style.backgroundImage = `url(${url1})`; };
            img2.onload = () => { d2.style.backgroundImage = `url(${url2})`; };

            d1.querySelector('h2').innerText = item.opt1;
            d2.querySelector('h2').innerText = item.opt2;
        }

        function preloadThisThatImages() {
            if (!gameData || !gameData.this_or_that) return;
            // Preload all This/That images in the background on first load
            gameData.this_or_that.forEach(item => {
                new Image().src = addUnsplashParams(item.img1);
                new Image().src = addUnsplashParams(item.img2);
            });
        }

        // TIMER LOGIC
        function getTimerCircumference() {
            // Calculate the actual circumference from the rendered SVG ring
            const ring = document.getElementById('timer-ring');
            const r = ring.r.baseVal.value;
            return 2 * Math.PI * r;
        }

        function startTimer() {
            const display = document.getElementById('timer-display');
            const ring = document.getElementById('timer-ring');
            const mission = document.getElementById('timer-mission');
            const btn = document.getElementById('timer-btn');

            // Get circumference dynamically so it matches the actual rendered SVG size
            timerCircumference = getTimerCircumference();
            ring.style.strokeDasharray = timerCircumference;

            const item = getRandom(gameData.timer_missions);
            mission.innerText = item ? item.content : "בצעו משימה!";
            mission.style.opacity = '1';

            let left = TIMER_DURATION;
            btn.disabled = true;

            // Show full ring immediately when timer starts
            ring.style.strokeDashoffset = 0;

            timerInterval = setInterval(() => {
                left--;
                display.innerText = left;
                // Ring empties as time counts down (full → empty)
                ring.style.strokeDashoffset = timerCircumference * (1 - left / TIMER_DURATION);
                if (left <= 0) {
                    clearInterval(timerInterval);
                    btn.disabled = false;
                    display.innerText = "🔥";
                    spawnSparkles(window.innerWidth / 2, window.innerHeight / 3, 40);
                }
            }, 1000);
        }

        function resetTimer() {
            if (timerInterval) clearInterval(timerInterval);
            const ring = document.getElementById('timer-ring');
            timerCircumference = getTimerCircumference();
            ring.style.strokeDasharray = timerCircumference;
            ring.style.strokeDashoffset = timerCircumference; // empty ring = ready state
            document.getElementById('timer-display').innerText = TIMER_DURATION;
            document.getElementById('timer-mission').style.opacity = "0";
            document.getElementById('timer-btn').disabled = false;
        }

        // LOTTO LOGIC
        function spinLotto() {
            const s1 = document.getElementById('slot-1');
            const s2 = document.getElementById('slot-2');
            let i = 0;
            const interval = setInterval(() => {
                s1.innerText = getRandom(gameData.lotto.actions);
                s2.innerText = getRandom(gameData.lotto.parts);
                i++;
                if (i > 15) {
                    clearInterval(interval);
                    spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 40);
                }
            }, 80);
        }

        function spawnSparkles(x, y, amount) {
            const container = document.getElementById('sparkle-container');
            for (let i = 0; i < amount; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                const size = Math.random() * 5 + 2;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.backgroundColor = Math.random() > 0.5 ? '#00f3ff' : '#ff00ff';
                container.appendChild(s);
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                const anim = s.animate(
                    [{ transform: 'translate(0,0) scale(1)', opacity: 1 },
                     { transform: `translate(${tx}px,${ty}px) scale(0)`, opacity: 0 }],
                    { duration: 1000 }
                );
                anim.onfinish = () => s.remove(); // clean up immediately when done
            }
        }

        loadGameContent();
    </script>
</body>

</html>
